name: Index server image

# Builds and publishes the remote index server (index_server/) as a multi-arch
# container image to the GitHub Container Registry (ghcr.io), so it can be pulled
# and reused on any host:
#     docker run -d -p 8000:8000 -v pdf-qa-index:/data \
#       ghcr.io/szalaybalazs/pdf-qa-index:latest
#
# Trigger: the same `v*` tag push that releases the desktop app (so the image
# version tracks the app version), or manually from the Actions tab.
on:
  push:
    tags: ["v*"]
  workflow_dispatch:

jobs:
  image:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write   # push to ghcr.io under this repo's owner
    steps:
      - uses: actions/checkout@v4

      # QEMU + Buildx enable the linux/arm64 build alongside linux/amd64, so the
      # image runs on both Apple-silicon/ARM hosts and typical x86 servers.
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute tags + labels
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/pdf-qa-index
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha
            type=raw,value=latest

      # Context is the repo root (the Dockerfile copies the pdf_qa package, whose
      # store.py the server reuses); the Dockerfile lives under index_server/.
      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: index_server/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
