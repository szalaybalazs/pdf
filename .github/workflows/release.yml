name: Release

# Builds, signs/notarizes and publishes the desktop app to S3 (served via
# update.szalay.me) for macOS (arm64), Windows (x64) and Linux (x64 + arm64,
# the latter covering 64-bit Raspberry Pi OS). On a tag push it also collects the
# installers from every runner and attaches them to a GitHub Release.
#
# Trigger: push a tag like v0.0.2 *after* bumping app/package.json to the same
# version (electron-updater compares against package.json's version, not the tag).
#     cd app && npm version patch && cd .. && git push --follow-tags
#
# Or run manually from the Actions tab (workflow_dispatch). Manual runs still
# publish to S3 but skip the GitHub Release (there's no tag to attach it to).
on:
  push:
    tags: ["v*"]
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          # Apple Silicon build. To also ship Intel Macs, add a second entry
          # `{ os: macos-13, platform: mac, arch: x64 }` — but note both mac jobs
          # then write latest-mac.yml and the later upload wins, so you'd need to
          # merge the two manifests before the final publish.
          - os: macos-14
            platform: mac
            arch: arm64
          - os: windows-latest
            platform: win
            arch: x64
          # Linux x86_64. Built on the oldest supported Ubuntu for the widest
          # glibc compatibility (AppImage runs on hosts with glibc >= build host).
          - os: ubuntu-22.04
            platform: linux
            arch: x64
          # Linux arm64 — covers 64-bit Raspberry Pi OS (Pi 3/4/5) and other
          # aarch64 boxes. Native GitHub-hosted arm64 runner (PyInstaller can
          # only freeze on the target arch, so no cross-build / QEMU).
          - os: ubuntu-22.04-arm
            platform: linux
            arch: arm64

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: app/package-lock.json

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python deps + PyInstaller
        run: python -m pip install --upgrade pip && pip install -r requirements.txt pyinstaller

      # Linux build/OCR deps: patchelf (relocate tesseract in vendor-tesseract.sh),
      # fakeroot (electron-builder deb packaging), and the tesseract engine + the
      # traineddata packages for every language in PDF_QA_BUNDLE_LANGS. Package
      # names use hyphens (chi-sim) though the traineddata is chi_sim.
      - name: Install Linux build dependencies
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            patchelf fakeroot \
            tesseract-ocr tesseract-ocr-osd \
            tesseract-ocr-eng tesseract-ocr-deu tesseract-ocr-fra \
            tesseract-ocr-spa tesseract-ocr-ita tesseract-ocr-por \
            tesseract-ocr-nld tesseract-ocr-rus tesseract-ocr-ara \
            tesseract-ocr-chi-sim tesseract-ocr-chi-tra \
            tesseract-ocr-jpn tesseract-ocr-kor

      - name: Freeze backend (PyInstaller)
        shell: bash
        env:
          PDF_QA_BUILD_PYTHON: python
        run: bash scripts/build-backend.sh

      - name: Install app deps
        working-directory: app
        run: npm ci

      - name: Build app (main + renderer + css)
        working-directory: app
        run: npm run build

      - name: Publish ${{ matrix.platform }} (${{ matrix.arch }})
        working-directory: app
        shell: bash
        run: npx electron-builder --${{ matrix.platform }} --${{ matrix.arch }} --publish always
        env:
          # S3 upload (the `personal` profile isn't present in CI; use keys).
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          # macOS code-signing + notarization (ignored on the Windows runner).
          CSC_LINK: ${{ secrets.MAC_CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.MAC_CSC_KEY_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          # Windows code-signing (ignored on the macOS runner).
          WIN_CSC_LINK: ${{ secrets.WIN_CSC_LINK }}
          WIN_CSC_KEY_PASSWORD: ${{ secrets.WIN_CSC_KEY_PASSWORD }}

      - name: Invalidate CloudFront cache
        shell: bash
        run: bash scripts/invalidate-cloudfront.sh
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          # Override the default in the script if you change distributions:
          CF_DISTRIBUTION_ID: E6428K3WFUDSE

      # Hand the just-built installers to the github-release job below. Only the
      # distributables (not the unpacked .app dir electron-builder also leaves in
      # release/). Tag pushes only — manual dispatch has no tag to release against.
      - name: Upload installers for the release job
        if: startsWith(github.ref, 'refs/tags/')
        uses: actions/upload-artifact@v4
        with:
          name: installers-${{ matrix.platform }}-${{ matrix.arch }}
          path: |
            app/release/*.dmg
            app/release/*.zip
            app/release/*.exe
            app/release/*.AppImage
            app/release/*.deb
            app/release/*.blockmap
            app/release/latest*.yml
          if-no-files-found: error
          retention-days: 1

  # Collect every runner's installers into a single GitHub Release for the tag.
  # Kept separate from the matrix so the two runners never race to create the
  # same release. Skipped on manual (workflow_dispatch) runs — no tag to attach.
  github-release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write   # required for the GITHUB_TOKEN to create/edit releases
    steps:
      - name: Check out repo (for app/release-notes.md)
        uses: actions/checkout@v4

      - name: Download all installers
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: installers-*
          merge-multiple: true   # flatten every job's files into artifacts/

      - name: Create / update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          body_path: app/release-notes.md   # same notes the in-app updater shows
          fail_on_unmatched_files: true
          files: artifacts/**/*
